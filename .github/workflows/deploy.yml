name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: Weather
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate weather secret
        run: |
          if [ -z "${WEATHER_API_KEY}" ]; then
            echo "ERROR: WEATHER_API_KEY secret is not available from the Weather environment."
            exit 1
          fi
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}

      - name: Inject API Key
        run: |
          python3 - <<'PY'
          import pathlib, os

          config_path = pathlib.Path('js/config.js')
          content = config_path.read_text()
          placeholder = '__WEATHER_API_KEY__'
          api_key = os.environ.get('WEATHER_API_KEY', '').strip()

          if not api_key:
              raise SystemExit('ERROR: WEATHER_API_KEY secret is missing or empty.')
          if placeholder not in content:
              raise SystemExit('ERROR: placeholder string not found in js/config.js.')

          content = content.replace(placeholder, api_key)
          config_path.write_text(content)

          if placeholder in config_path.read_text():
              raise SystemExit('ERROR: failed to replace WEATHER_API_KEY placeholder.')
          print('✅ WEATHER_API_KEY injected successfully.')
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
